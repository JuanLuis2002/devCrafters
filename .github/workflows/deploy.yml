name: Deploy JAVA CLIENTE App to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Copy source code to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/home/Cliente/docker-cliente"

      - name: Build and deploy on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/Cliente/docker-cliente
            
            # Dar permisos a gradlew
            chmod +x ./gradlew
            
            # Construir el JAR
            ./gradlew clean build -x test
            
            # Verificar que el JAR se creó
            ls -la build/libs/
            
            # Detener y eliminar contenedor anterior
            docker stop cliente-container || true
            docker rm cliente-container || true
            
            # Construir imagen Docker
            docker build -t mi-cliente .
            
            # Ejecutar nuevo contenedor
            docker run -d --name cliente-container -p 8090:8090 mi-cliente
